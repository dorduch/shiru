name: shiru
description: "Shiru – a playful DIY audio player for kids."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^17.1.0
  http: ^1.6.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  just_audio: ^0.10.5
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^11.3.0
  record: ^6.0.0
  sqflite_sqlcipher: ^2.2.1
  flutter_secure_storage: ^9.2.4
  uuid: ^4.5.3
  wakelock_plus: ^1.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#222f3e"
  adaptive_icon_foreground: "assets/images/app_icon.png"
